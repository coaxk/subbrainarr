  <circle cx="45" cy="18" r="1.5" fill="#c4b5fd"/>
  <circle cx="14" cy="32" r="1.5" fill="#a78bfa"/>
  <circle cx="50" cy="32" r="1.5" fill="#818cf8"/>
  <!-- Brain stem -->
