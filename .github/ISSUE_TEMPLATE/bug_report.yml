name: Bug Report
description: Report a bug in SubBrainArr
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the information below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include any error messages or screenshots.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SubBrainArr Version
      description: "Version from the UI or Docker image tag (e.g., v1.6.1)"
      placeholder: v1.6.1
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Docker
        - Docker Compose
        - Bare metal (Python + npm)
    validations:
      required: true

  - type: dropdown
    id: tab
    attributes:
      label: Which Tab
      description: Which tab were you on when the issue occurred?
      options:
        - Connection
        - Languages
        - Tuning
        - Scanning
        - N/A
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., Ubuntu 22.04, Windows 11, Unraid 6.12"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "e.g., Chrome 120, Firefox 121"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output (Docker logs, browser console, etc.)
      render: shell
    validations:
      required: false
